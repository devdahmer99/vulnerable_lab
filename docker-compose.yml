version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: vulnlab
      MYSQL_USER: vuln
      MYSQL_PASSWORD: vulnpass
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    volumes:
      - ./backend/app:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: vulnlab
      DB_USERNAME: vuln
      DB_PASSWORD: vulnpass

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./backend/app:/var/www/html:ro
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: ["npm", "run", "dev"]

volumes:
  db_data:
